name: ff_gamers_companion
description: "FF Gamers Companion - Free Fire Gaming Utility App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Device Info
  device_info_plus: ^13.0.0
  
  # Icons
  ionicons: ^0.2.2
  
  # Fonts
  google_fonts: ^6.2.1
  
  # HTTP & URL
  http: ^1.4.0
  url_launcher: ^6.3.1
  
  # Clipboard
  clipboard: ^3.0.14
  
  # Path Provider
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/data/