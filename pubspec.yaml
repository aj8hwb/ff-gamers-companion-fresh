name: ff_gamers_companion
description: "FF Gamers Companion - Free Fire Gaming Utility App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: 6.2.1
  device_info_plus: 11.5.0
  clipboard: 0.1.3
  ionicons: ^0.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  lottie: ^3.1.0
  path_provider: ^2.1.5
  http: ^1.4.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/data/